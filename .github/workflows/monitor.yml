name: steam-monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # реальная частота у GitHub — 5–20 минут, без гарантий
  workflow_dispatch: {}      # кнопка ручного запуска во вкладке Actions

permissions:
  contents: write

concurrency:
  group: steam-monitor
  cancel-in-progress: true   # новый запуск снимает зависший, а не встаёт в очередь

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run monitor pass
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python cron_check.py

      - name: Commit state
        run: |
          git config user.name "steam-monitor"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "steam-monitor: update state [skip ci]"
            git pull --rebase origin main
            git push
          fi
