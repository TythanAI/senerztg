# ---------------------------------------------------------------------------
# ThemeMarket
# Generated by tools/gen_niche_configs.py. Secrets come from the environment
# / .env (BOT_TOKEN, PROVIDER_TOKEN, CRYPTOBOT_TOKEN, ADMIN_IDS).
# ---------------------------------------------------------------------------
name: ThemeMarket
slug: wp_themes
language: ru
currency: USD
support_username: '@thememarket_support'
token_env: BOT_TOKEN
admin_env: ADMIN_IDS
orders_chat_env: ORDERS_CHAT_ID
fulfillment: digital
welcome: '👋 Добро пожаловать в <b>ThemeMarket</b>!


  Темы и плагины для WordPress.


  ✅ Оплата картой или криптовалютой

  ⚡️ Моментальная автоматическая выдача'
rules: '<b>Правила магазина</b>


  • Цифровой товар возврату не подлежит после выдачи.

  • Проверяйте товар сразу после получения.

  • Брак заменяем по обращению в поддержку.'
payments:
  telegram_enabled: true
  telegram_provider_token_env: PROVIDER_TOKEN
  cryptobot_enabled: true
  cryptobot_token_env: CRYPTOBOT_TOKEN
  cryptobot_testnet: false
  cod_enabled: false
catalog:
- id: themes
  title: Темы
  emoji: 🎨
  products:
  - sku: theme_business
    title: Тема «Бизнес»
    price: 15.0
    description: Готовый сайт-визитка.
  - sku: theme_shop
    title: Тема «Магазин»
    price: 22.0
    description: WooCommerce-совместимая.
- id: plugins
  title: Плагины
  emoji: 🧩
  products:
  - sku: plugin_seo
    title: SEO-плагин (лицензия)
    price: 9.0
    description: Продвижение сайта.
