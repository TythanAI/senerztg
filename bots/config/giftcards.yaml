# ---------------------------------------------------------------------------
# GiftZone
# Generated by tools/gen_domain_configs.py. Secrets come from the
# environment / .env (BOT_TOKEN, PROVIDER_TOKEN, CRYPTOBOT_TOKEN, ADMIN_IDS).
# ---------------------------------------------------------------------------
name: GiftZone
slug: giftcards
language: ru
currency: USD
fulfillment: digital
support_username: '@giftzone_support'
token_env: BOT_TOKEN
admin_env: ADMIN_IDS
orders_chat_env: ORDERS_CHAT_ID
welcome: '👋 Добро пожаловать в <b>GiftZone</b>!


  Подарочные карты и коды пополнения популярных сервисов.


  ✅ Оплата картой или криптовалютой

  ⚡️ Моментальная автоматическая выдача'
rules: '<b>Правила магазина</b>


  • Цифровой товар возврату не подлежит после выдачи.

  • Проверяйте товар сразу после получения.

  • Брак заменяем по обращению в поддержку.

  • Покупая товар, вы соглашаетесь с правилами.'
payments:
  telegram_enabled: true
  telegram_provider_token_env: PROVIDER_TOKEN
  cryptobot_enabled: true
  cryptobot_token_env: CRYPTOBOT_TOKEN
  cryptobot_testnet: false
  cod_enabled: false
catalog:
- id: stores
  title: Магазины
  emoji: 🛍
  products:
  - sku: gc_amazon_25
    title: Amazon — $25
    price: 24.0
    description: Код подарочной карты Amazon на $25.
  - sku: gc_steam_20
    title: Steam — $20
    price: 19.5
    description: Код пополнения кошелька Steam на $20.
- id: mobile
  title: Мобильные
  emoji: 📱
  products:
  - sku: gc_appstore_15
    title: App Store / iTunes — $15
    price: 14.5
    description: Код пополнения Apple на $15.
  - sku: gc_google_15
    title: Google Play — $15
    price: 14.5
    description: Код пополнения Google Play на $15.
