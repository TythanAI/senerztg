# ---------------------------------------------------------------------------
# GameVault
# Generated by tools/gen_domain_configs.py. Secrets come from the
# environment / .env (BOT_TOKEN, PROVIDER_TOKEN, CRYPTOBOT_TOKEN, ADMIN_IDS).
# ---------------------------------------------------------------------------
name: GameVault
slug: game_keys
language: ru
currency: USD
fulfillment: digital
support_username: '@gamevault_support'
token_env: BOT_TOKEN
admin_env: ADMIN_IDS
orders_chat_env: ORDERS_CHAT_ID
welcome: '👋 Добро пожаловать в <b>GameVault</b>!


  Ключи для игр и пополнение игровых кошельков.


  ✅ Оплата картой или криптовалютой

  ⚡️ Моментальная автоматическая выдача'
rules: '<b>Правила магазина</b>


  • Цифровой товар возврату не подлежит после выдачи.

  • Проверяйте товар сразу после получения.

  • Брак заменяем по обращению в поддержку.

  • Покупая товар, вы соглашаетесь с правилами.'
payments:
  telegram_enabled: true
  telegram_provider_token_env: PROVIDER_TOKEN
  cryptobot_enabled: true
  cryptobot_token_env: CRYPTOBOT_TOKEN
  cryptobot_testnet: false
  cod_enabled: false
catalog:
- id: games
  title: Игры
  emoji: 🎮
  products:
  - sku: game_key_aaa
    title: Ключ AAA-игры (Steam)
    price: 25.0
    description: Ключ активации в Steam для новинки.
  - sku: game_key_indie
    title: Ключ инди-игры
    price: 8.0
    description: Ключ активации популярной инди-игры.
- id: topup
  title: Пополнения
  emoji: 💰
  products:
  - sku: topup_steam_10
    title: Steam кошелёк — $10
    price: 10.0
    description: Код пополнения Steam на $10.
  - sku: topup_ps_10
    title: PlayStation — $10
    price: 10.0
    description: Код пополнения PSN на $10.
