name: TeleStore
slug: tg_accounts_01
language: ru
currency: USD
fulfillment: digital
support_username: '@telestore_support'
token_env: BOT_TOKEN
admin_env: ADMIN_IDS
orders_chat_env: ORDERS_CHAT_ID
welcome: '👋 Добро пожаловать в <b>TeleStore</b>!


  Магазин Telegram-аккаунтов: свежие виртуалки, отлежавшиеся и премиум.


  ✅ Оплата картой или криптовалютой

  ⚡️ Моментальная автоматическая выдача

  🛡 Замена в случае брака по правилам магазина'
rules: '<b>Правила магазина</b>


  • Товар цифровой — после выдачи возврату не подлежит.

  • Проверяйте вход в аккаунт сразу после получения.

  • Брак заменяем в течение 24 часов при наличии доказательств.

  • Использование аккаунтов — под вашу ответственность и по законам вашей страны.'
payments:
  telegram_enabled: true
  telegram_provider_token_env: PROVIDER_TOKEN
  cryptobot_enabled: true
  cryptobot_token_env: CRYPTOBOT_TOKEN
  cryptobot_testnet: false
  cod_enabled: false
catalog:
