# ---------------------------------------------------------------------------
# ProxyHub
# Generated by tools/gen_domain_configs.py. Secrets come from the
# environment / .env (BOT_TOKEN, PROVIDER_TOKEN, CRYPTOBOT_TOKEN, ADMIN_IDS).
# ---------------------------------------------------------------------------
name: ProxyHub
slug: proxies
language: ru
currency: USD
fulfillment: digital
support_username: '@proxyhub_support'
token_env: BOT_TOKEN
admin_env: ADMIN_IDS
orders_chat_env: ORDERS_CHAT_ID
welcome: '👋 Добро пожаловать в <b>ProxyHub</b>!


  Приватные и резидентные прокси для любых задач.


  ✅ Оплата картой или криптовалютой

  ⚡️ Моментальная автоматическая выдача'
rules: '<b>Правила магазина</b>


  • Цифровой товар возврату не подлежит после выдачи.

  • Проверяйте товар сразу после получения.

  • Брак заменяем по обращению в поддержку.

  • Покупая товар, вы соглашаетесь с правилами.'
payments:
  telegram_enabled: true
  telegram_provider_token_env: PROVIDER_TOKEN
  cryptobot_enabled: true
  cryptobot_token_env: CRYPTOBOT_TOKEN
  cryptobot_testnet: false
  cod_enabled: false
catalog:
- id: datacenter
  title: Датацентр
  emoji: 🖥
  products:
  - sku: proxy_ipv4
    title: IPv4 прокси (1 шт., 30 дн.)
    price: 2.0
    description: Приватный IPv4, HTTP/SOCKS5.
  - sku: proxy_ipv6
    title: IPv6 прокси (10 шт., 30 дн.)
    price: 3.0
    description: Пакет IPv6 для массовых задач.
- id: residential
  title: Резидентные
  emoji: 🏠
  products:
  - sku: proxy_res_1gb
    title: Резидентные — 1 ГБ
    price: 4.5
    description: Ротация IP, оплата за трафик.
  - sku: proxy_res_5gb
    title: Резидентные — 5 ГБ
    price: 20.0
    description: Пакет 5 ГБ со скидкой.
