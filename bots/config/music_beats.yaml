# ---------------------------------------------------------------------------
# BeatStore
# Generated by tools/gen_niche_configs.py. Secrets come from the environment
# / .env (BOT_TOKEN, PROVIDER_TOKEN, CRYPTOBOT_TOKEN, ADMIN_IDS).
# ---------------------------------------------------------------------------
name: BeatStore
slug: music_beats
language: ru
currency: USD
support_username: '@beatstore_support'
token_env: BOT_TOKEN
admin_env: ADMIN_IDS
orders_chat_env: ORDERS_CHAT_ID
fulfillment: digital
welcome: '👋 Добро пожаловать в <b>BeatStore</b>!


  Биты, сэмплы и пресеты для музыкантов.


  ✅ Оплата картой или криптовалютой

  ⚡️ Моментальная автоматическая выдача'
rules: '<b>Правила магазина</b>


  • Цифровой товар возврату не подлежит после выдачи.

  • Проверяйте товар сразу после получения.

  • Брак заменяем по обращению в поддержку.'
payments:
  telegram_enabled: true
  telegram_provider_token_env: PROVIDER_TOKEN
  cryptobot_enabled: true
  cryptobot_token_env: CRYPTOBOT_TOKEN
  cryptobot_testnet: false
  cod_enabled: false
catalog:
- id: beats
  title: Биты
  emoji: 🎵
  products:
  - sku: beat_lease
    title: Бит (lease-лицензия)
    price: 20.0
    description: MP3/WAV + права на релиз.
  - sku: beat_excl
    title: Бит (эксклюзив)
    price: 150.0
    description: Полные права, снимается с продажи.
- id: samples
  title: Сэмплы
  emoji: 🎚
  products:
  - sku: sample_pack
    title: Сэмпл-пак
    price: 12.0
    description: Набор роялти-фри сэмплов.
