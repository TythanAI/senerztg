    title: Discord Nitro (1 мес.)
    price: 4.5
    description: Полный Nitro на месяц.
  - sku: nitro_1y
    title: Discord Nitro (1 год)
    price: 40.0
    description: Годовая подписка.
- id: boosts
  title: Бусты
  emoji: 🚀
  products:
  - sku: boost_14
    title: 14 бустов (1 мес.)
    price: 12.0
    description: Максимальный уровень сервера.
