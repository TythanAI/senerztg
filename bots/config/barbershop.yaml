  1. Выберите позиции и добавьте в корзину.

  2. Оформите заказ и укажите адрес.

  3. Выберите оплату онлайн или на месте.

  4. Мы подтвердим и приедем к вам.'
delivery_note: Мастер свяжется для подтверждения времени.
