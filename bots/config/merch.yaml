name: MerchLab
slug: merch
language: ru
currency: USD
support_username: '@merchlab_support'
token_env: BOT_TOKEN
admin_env: ADMIN_IDS
orders_chat_env: ORDERS_CHAT_ID
fulfillment: physical
welcome: '👋 <b>MerchLab</b>


  Мерч и одежда с печатью.


  🛒 Соберите заказ в корзину

  💳 Оплата картой, криптой или при получении

  🚚 Доставка по городу'
rules: '<b>Как это работает</b>


  1. Выберите позиции и добавьте в корзину.

  2. Оформите заказ и укажите адрес.

  3. Выберите оплату онлайн или на месте.

  4. Мы подтвердим и приедем к вам.'
delivery_note: Печать 2–4 дня, затем доставка.
payments:
  telegram_enabled: true
  telegram_provider_token_env: PROVIDER_TOKEN
  cryptobot_enabled: true
  cryptobot_token_env: CRYPTOBOT_TOKEN
  cryptobot_testnet: false
  cod_enabled: true
