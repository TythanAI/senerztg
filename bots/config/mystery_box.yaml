name: LootBox
slug: mystery_box
language: ru
currency: USD
support_username: '@lootbox_support'
token_env: BOT_TOKEN
admin_env: ADMIN_IDS
orders_chat_env: ORDERS_CHAT_ID
fulfillment: digital
welcome: '👋 Добро пожаловать в <b>LootBox</b>!


  Цифровые mystery-box: случайный приз внутри!


  ✅ Оплата картой или криптовалютой

  ⚡️ Моментальная автоматическая выдача'
rules: '<b>Правила магазина</b>


  • Цифровой товар возврату не подлежит после выдачи.

  • Проверяйте товар сразу после получения.

  • Брак заменяем по обращению в поддержку.'
payments:
  telegram_enabled: true
  telegram_provider_token_env: PROVIDER_TOKEN
  cryptobot_enabled: true
  cryptobot_token_env: CRYPTOBOT_TOKEN
  cryptobot_testnet: false
  cod_enabled: false
catalog:
- id: boxes
  title: Боксы
  emoji: 🎁
  products:
  - sku: box_small
    title: Mystery Box — Small
    price: 3.0
    description: Случайный цифровой приз (ключ/промокод/подписка).
  - sku: box_big
    title: Mystery Box — Big
    price: 10.0
    description: Приз повышенной ценности гарантирован.
