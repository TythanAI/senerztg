# ---------------------------------------------------------------------------
# PixelMarket
# Generated by tools/gen_domain_configs.py. Secrets come from the
# environment / .env (BOT_TOKEN, PROVIDER_TOKEN, CRYPTOBOT_TOKEN, ADMIN_IDS).
# ---------------------------------------------------------------------------
name: PixelMarket
slug: design
language: ru
currency: USD
fulfillment: digital
support_username: '@pixelmarket_support'
token_env: BOT_TOKEN
admin_env: ADMIN_IDS
orders_chat_env: ORDERS_CHAT_ID
welcome: '👋 Добро пожаловать в <b>PixelMarket</b>!


  Готовые дизайн-шаблоны и цифровые ассеты.


  ✅ Оплата картой или криптовалютой

  ⚡️ Моментальная автоматическая выдача'
rules: '<b>Правила магазина</b>


  • Цифровой товар возврату не подлежит после выдачи.

  • Проверяйте товар сразу после получения.

  • Брак заменяем по обращению в поддержку.

  • Покупая товар, вы соглашаетесь с правилами.'
payments:
  telegram_enabled: true
  telegram_provider_token_env: PROVIDER_TOKEN
  cryptobot_enabled: true
  cryptobot_token_env: CRYPTOBOT_TOKEN
  cryptobot_testnet: false
  cod_enabled: false
catalog:
- id: templates
  title: Шаблоны
  emoji: 🎨
  products:
  - sku: tpl_logo
    title: Пакет логотипов (10 шт.)
    price: 8.0
    description: Редактируемые исходники в векторе.
  - sku: tpl_presentation
    title: Шаблон презентации
    price: 6.0
    description: Готовый шаблон для PowerPoint/Keynote.
- id: assets
  title: Ассеты
  emoji: 🧩
  products:
  - sku: asset_icons
    title: Набор иконок (200 шт.)
    price: 5.0
    description: SVG/PNG набор иконок для интерфейсов.
  - sku: asset_ui_kit
    title: UI-kit для приложения
    price: 12.0
    description: Компоненты интерфейса, Figma.
