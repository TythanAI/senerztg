name: CloudNode
slug: hosting
language: ru
currency: USD
fulfillment: digital
support_username: '@cloudnode_support'
token_env: BOT_TOKEN
admin_env: ADMIN_IDS
orders_chat_env: ORDERS_CHAT_ID
welcome: '👋 Добро пожаловать в <b>CloudNode</b>!


  VPS и хостинг с моментальной выдачей доступов.


  ✅ Оплата картой или криптовалютой

  ⚡️ Моментальная автоматическая выдача'
rules: '<b>Правила магазина</b>


  • Цифровой товар возврату не подлежит после выдачи.

  • Проверяйте товар сразу после получения.

  • Брак заменяем по обращению в поддержку.

  • Покупая товар, вы соглашаетесь с правилами.'
payments:
  telegram_enabled: true
  telegram_provider_token_env: PROVIDER_TOKEN
  cryptobot_enabled: true
  cryptobot_token_env: CRYPTOBOT_TOKEN
  cryptobot_testnet: false
  cod_enabled: false
catalog:
- id: vps
  title: VPS
  emoji: 🖥
  products:
  - sku: vps_start
    title: VPS Start (1 vCPU / 1 ГБ)
    price: 4.0
    description: 1 vCPU, 1 ГБ RAM, 20 ГБ SSD. Данные доступа в выдаче.
  - sku: vps_pro
    title: VPS Pro (2 vCPU / 4 ГБ)
    price: 10.0
    description: 2 vCPU, 4 ГБ RAM, 60 ГБ SSD.
- id: web
  title: Веб-хостинг
  emoji: 🌐
  products:
  - sku: host_basic
    title: Хостинг Basic (1 мес.)
    price: 2.5
    description: 10 ГБ, 1 сайт, SSL.
  - sku: host_business
    title: Хостинг Business (1 мес.)
    price: 6.0
    description: 50 ГБ, безлимит сайтов, SSL.
