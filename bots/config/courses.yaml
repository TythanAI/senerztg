# ---------------------------------------------------------------------------
# SkillShop
# Generated by tools/gen_domain_configs.py. Secrets come from the
# environment / .env (BOT_TOKEN, PROVIDER_TOKEN, CRYPTOBOT_TOKEN, ADMIN_IDS).
# ---------------------------------------------------------------------------
name: SkillShop
slug: courses
language: ru
currency: USD
fulfillment: digital
support_username: '@skillshop_support'
token_env: BOT_TOKEN
admin_env: ADMIN_IDS
orders_chat_env: ORDERS_CHAT_ID
welcome: '👋 Добро пожаловать в <b>SkillShop</b>!


  Онлайн-курсы и электронные книги. Доступ приходит сразу.


  ✅ Оплата картой или криптовалютой

  ⚡️ Моментальная автоматическая выдача'
rules: '<b>Правила магазина</b>


  • Цифровой товар возврату не подлежит после выдачи.

  • Проверяйте товар сразу после получения.

  • Брак заменяем по обращению в поддержку.

  • Покупая товар, вы соглашаетесь с правилами.'
payments:
  telegram_enabled: true
  telegram_provider_token_env: PROVIDER_TOKEN
  cryptobot_enabled: true
  cryptobot_token_env: CRYPTOBOT_TOKEN
  cryptobot_testnet: false
  cod_enabled: false
catalog:
- id: courses
  title: Курсы
  emoji: 🎓
  products:
  - sku: course_python
    title: Курс «Python с нуля»
    price: 15.0
    description: Видеокурс + материалы. Ссылка на доступ в выдаче.
  - sku: course_smm
    title: Курс «SMM-специалист»
    price: 20.0
    description: Полный курс по продвижению в соцсетях.
- id: ebooks
  title: Электронные книги
  emoji: 📚
  products:
  - sku: ebook_finance
    title: Книга «Личные финансы»
    price: 5.0
    description: PDF/EPUB, мгновенная выдача ссылки.
  - sku: ebook_marketing
    title: Книга «Маркетинг 101»
    price: 5.0
    description: Основы маркетинга для начинающих.
