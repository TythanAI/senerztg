welcome: '👋 <b>RollBox — роллы и фастфуд</b>


  Роллы, суши-сеты и фастфуд с доставкой. Свежесть и скорость.


  🛒 Соберите заказ в корзину

  💳 Оплата картой, криптой или при получении

  🚚 Доставка по городу'
rules: '<b>Как это работает</b>


  1. Добавьте блюда в корзину.

  2. Оформите заказ и укажите адрес.

  3. Выберите оплату онлайн или при получении.

  4. Мы подтвердим заказ и привезём его вам.'
delivery_note: Доставка 60–90 минут. Минимальный заказ — 700 ₽.
payments:
  telegram_enabled: true
  telegram_provider_token_env: PROVIDER_TOKEN
  cryptobot_enabled: true
  cryptobot_token_env: CRYPTOBOT_TOKEN
  cryptobot_testnet: false
  cod_enabled: true
